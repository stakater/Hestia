          "kind": "Runner",
          "metadata": {
            "name": "runner"
          },
          "spec": {
            "deploymentSelector": {
              "matchLabels": {
                "app": "test"
              }
            },
            "template": {
              "spec": {
                "containers": [
                  {
                    "env": [
                      {
                        "name": "JOB_NAME",
                        "value": "runner-1"
                      },
                      {
                        "name": "PUSHGATEWAY_TOKEN",
                        "valueFrom": {
                          "secretKeyRef": {
                            "key": "token",
                            "name": "pushgateway-token"
                          }
                        }
                      }
                    ],
                    "image": "e2e:passed",
                    "name": "playwright"
                  }
                ],
                "restartPolicy": "Never"
              }
            }
          }
        }
      ]
    capabilities: Basic Install
    createdAt: "2025-03-06T09:13:38Z"
    operators.operatorframework.io/builder: operator-sdk-v1.39.1
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: hestia-operator.v0.0.1
