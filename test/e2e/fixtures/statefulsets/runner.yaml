apiVersion: e2e.stakater.com/v1alpha1
kind: Runner
metadata:
  name: {{ .name }}
  labels:
    app: statefulset-runner
spec:
  deploymentSelector:
    matchLabels:
      app: e2e-statefulset
  template:
    spec:
      containers:
        - name: statefulset-job
          image: busybox
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "sleep {{ .jobDuration }} && echo done && exit 0"]
      restartPolicy: Never
