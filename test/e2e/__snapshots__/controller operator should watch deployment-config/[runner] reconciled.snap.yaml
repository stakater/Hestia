
[controller operator should watch deployment-config - 1]
metadata:
  name: <Any value>
  namespace: hestia-deployment-config-instance
  uid: <Any value>
  resourceVersion: <Any value>
  generation: 1
  creationTimestamp: <Any value>
  labels:
    app: deployment-config-runner
  annotations: <Any value>
  managedFields: <Any value>
spec:
  deploymentSelector:
    matchLabels:
      app: e2e-deployment-config
  template:
    spec:
      containers:
        - name: deployment-config-job
          image: busybox
          command:
            - sh
            - -c
            - sleep 1 && echo done && exit 0
          imagePullPolicy: IfNotPresent
      restartPolicy: Never
status:
  conditions:
    - type: ReconcileSuccess
      status: "True"
      lastTransitionTime: <Any value>
      reason: LastReconcileCycleSucceded
      message: ""

---
