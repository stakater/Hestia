
[controller operator should watch and schedule job for daemonset - 1]
metadata:
  name: cron-daemonset-runner
  namespace: hestia-cron-daemonset
  uid: <Any value>
  resourceVersion: <Any value>
  generation: 1
  creationTimestamp: <Any value>
  labels:
    runner.stakater.com/enable: "true"
    runner.stakater.com/name: cron-daemonset-runner
    runner.stakater.com/namespace: hestia-cron-daemonset
    runner.stakater.com/version: <Any value>
  ownerReferences: <Any value>
  managedFields: <Any value>
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  suspend: false
  jobTemplate:
    metadata:
      labels:
        runner.stakater.com/enable: "true"
        runner.stakater.com/name: cron-daemonset-runner
        runner.stakater.com/namespace: hestia-cron-daemonset
        runner.stakater.com/version: <Any value>
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      template:
        spec:
          containers:
            - name: e2e-cron-daemonset
              image: busybox
              command:
                - sh
                - -c
                - sleep 1 && echo done && exit 0
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              imagePullPolicy: IfNotPresent
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          dnsPolicy: ClusterFirst
          securityContext: {}
          schedulerName: default-scheduler
      ttlSecondsAfterFinished: 1800
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1

---
