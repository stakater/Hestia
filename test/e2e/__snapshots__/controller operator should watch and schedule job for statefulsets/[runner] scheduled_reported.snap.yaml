
[controller operator should watch and schedule job for statefulsets - 1]
metadata:
  name: cron-sts-runner
  namespace: hestia-cron-sts
  uid: <Any value>
  resourceVersion: <Any value>
  generation: 1
  creationTimestamp: <Any value>
  labels:
    app: cron-sts-job
  annotations: <Any value>
  managedFields: <Any value>
spec:
  deploymentSelector:
    matchLabels:
      app: cron-sts-job
  template:
    spec:
      containers:
        - name: statefulset-cronjob
          image: busybox
          command:
            - sh
            - -c
            - sleep 1 && echo done && exit 0
          imagePullPolicy: IfNotPresent
      restartPolicy: Never
  schedule: "* * * * *"
  deadlineSeconds: 120
status:
  conditions:
    - type: ReconcileSuccess
      status: "True"
      lastTransitionTime: <Any value>
      reason: LastReconcileCycleSucceded
      message: ""
    - type: JobCompleted
      status: "True"
      lastTransitionTime: <Any value>
      reason: Successful
      message: ""
  lastSuccessfulRunTime: <Any value>

---
