
[controller operator should watch deployments - 1]
metadata:
  name: <Any value>
  generateName: runner-
  namespace: hestia-instance
  uid: <Any value>
  resourceVersion: <Any value>
  generation: 1
  creationTimestamp: <Any value>
  labels:
    runner.stakater.com/enable: "true"
    runner.stakater.com/name: runner
    runner.stakater.com/namespace: hestia-instance
    runner.stakater.com/version: <Any value>
  ownerReferences: <Any value>
  managedFields: <Any value>
spec:
  parallelism: 1
  completions: 1
  backoffLimit: 1
  selector: <Any value>
  manualSelector: false
  template:
