# permissions for end users to edit runners.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hestia-operator
    app.kubernetes.io/managed-by: kustomize
  name: runner-editor-role
rules:
- apiGroups:
  - e2e.stakater.com
  resources:
  - runners
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - e2e.stakater.com
  resources:
  - runners/status
  verbs:
  - get
